<!DOCTYPE html>
<html>
    <head>
        <title>
            interview
        </title>
    </head>
    <body>
        <h1>Welcome to the mini interview! Please enter following information and we will contact you!</h1>
        <fieldset>
            <legend>Contact Information</legend>
            <label for="name">Enter name:</label>
            <input type="text" placeholder="Tsotne"> <br>
            <label for="surname">Enter surname:</label>
            <input type="text" placeholder="gujabidze"> <br>
            <label for="number">Enter number:</label>
            <input type="text" placeholder="123-456-7890"> <br>
            <label for="email">Enter email:</label>
            <input type="text" placeholder="someone123@gmail.com">
        </fieldset>
        <fieldset>
            <legend>Gender</legend>
            <label for="gender">Select your gender:</label>
            <select>
                <option>Male</option>
                <option>Female</option> 
            </select>
        </fieldset> 
        <fieldset>
            <legend>Programming Languages:</legend>
            <h3>Which of the following programming languages do you know?</h3>
            <label for="HTML">HTML</label>
            <input type="checkbox"> <br>
            <label type="checkbox">CSS</label>
            <input type="checkbox"> <br>
            <label type="checkbox">JavaScript</label>
            <input type="checkbox"> <br>
            <label type="checkbox">Python</label>
            <input type="checkbox"> <br>
            <label type="checkbox">Java</label>
            <input type="checkbox"> <br>
            <label type="checkbox">C++</label>
            <input type="checkbox"> <br>
        </fieldset>
        <fieldset>
            <legend>Experience</legend>
            <label for="Experience">Tell us about your experience:</label>
            <textarea placeholder="Share your experience here..."></textarea>
        </fieldset>
        <br>
        <button>
            <a href="result.html" style="color: black;">Submit</a>
        </button>
    </body>
</html>
